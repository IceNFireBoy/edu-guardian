sonar.projectKey=yourusername_edu-guardian
sonar.organization=yourusername

# Source code location (frontend + backend packages)
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src/__tests__,backend/src/__tests__

# Coverage reports
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,**/__mocks__/**

# Exclude node_modules and build artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Quality Gates
sonar.qualitygate.wait=true

# Exclude test files from analysis
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**
sonar.test.exclusions=**/node_modules/**
